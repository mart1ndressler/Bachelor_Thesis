<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martin Dressler's Bachelor Thesis</title>
    <link rel="icon" href="../images/logo.png" type="image/png">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <canvas id="bgCanvas" aria-hidden="true"></canvas>

    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
      <div class="container-fluid">
        <span class="navbar-brand" id="navBrand"></span>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
          <div class="navbar-nav navbar-tools">
            <button type="button" class="btn btn-primary btn-lg" id="aboutAppBtn" data-toggle="modal" data-target="#aboutModal">About My Bachelor's thesis</button>
            <img src="../images/cze_flag.png" alt="CZ" onclick="changeLanguage('cz')" class="flag-img">
            <img src="../images/uk_flag.png" alt="EN" onclick="changeLanguage('en')" class="flag-img">
          </div>
          <div class="navbar-nav ml-auto" id="backArrow">
            <button class="btn btn-outline-secondary" onclick="goBack()" id="backBtn">Go Back</button>
          </div>
        </div>
      </div>
    </nav>

    <div class="alg-panel" id="algorithmLinks">
      <div class="alg-panel-inner">
        <button class="btn alg-btn" id="algorithm1" onclick="changeContent('multipop')">Multipop on Stack</button>
        <button class="btn alg-btn" id="algorithm2" onclick="changeContent('queue2Stacks')">Queue using Two Stacks</button>
        <button class="btn alg-btn" id="algorithm3" onclick="changeContent('splayTree')">Splay Tree</button>
      </div>
    </div>
    
    <div id="dynamicContent" class="text-center mt-5"></div>

    <div class="modal fade" id="aboutModal" tabindex="-1" role="dialog" aria-labelledby="aboutModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg aboutModalWide" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="aboutModalLabel"></h5>
          </div>
          <div class="modal-body" id="aboutModalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-dismiss="modal" id="closeBtn"></button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="manualParamsModal" tabindex="-1" role="dialog" aria-labelledby="manualParamsModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="manualParamsModalLabel"></h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <form id="manualParamsForm">
              <div class="form-group">
                <label for="stackValues" id="stackValuesLabel"></label>
                <input type="text" class="form-control" id="stackValues" placeholder="1, 2, 3, 4">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="submitBtn"></button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="modal fade" id="randomParamsModal" tabindex="-1" role="dialog" aria-labelledby="randomParamsModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="randomParamsModalLabel"></h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <form id="randomParamsForm">
              <div class="form-group">
                <label for="rangeMin" id="rangeMinLabel"></label>
                <input type="number" class="form-control" id="rangeMin" placeholder="1">
              </div>
              <div class="form-group">
                <label for="rangeMax" id="rangeMaxLabel"></label>
                <input type="number" class="form-control" id="rangeMax" placeholder="100">
              </div>
              <div class="form-group">
                <label for="count" id="countLabel"></label>
                <input type="number" class="form-control" id="count" placeholder="10">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="generateBtn"></button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="syntaxModal" tabindex="-1" role="dialog" aria-labelledby="syntaxModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="syntaxModalLabel"></h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <p id="syntaxInfo"></p>
            <form id="syntaxForm">
              <div class="form-group">
                <label for="syntaxInput" id="syntaxInputLabel"></label>
                <input type="text" class="form-control" id="syntaxInput" placeholder="">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="startSyntaxBtn"></button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="bestWorstModal" tabindex="-1" role="dialog" aria-labelledby="bestWorstModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="bestWorstModalLabel"></h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>

          <div class="modal-body">
            <p id="bestWorstModalText"></p>
          </div>
          <div class="modal-footer justify-content-center">
            <button type="button" class="btn btn-primary caseButton">
              <span id="bestCaseButtonLabel"></span>
            </button>

            <button type="button" class="btn btn-primary caseButton">
              <span id="worstCaseButtonLabel"></span>
            </button>
          </div>

        </div>
      </div>
    </div>

    <div class="modal fade" id="actionInputModal" tabindex="-1" role="dialog" aria-labelledby="actionInputModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="actionInputModalLabel"></h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <form id="actionInputForm">
              <div class="form-group">
                <label for="actionInput" id="actionInputLabel"></label>
                <input class="form-control" id="actionInput" />
                <div class="invalid-feedback" id="actionInputError"></div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="actionOkBtn"></button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="messageModal" tabindex="-1" role="dialog" aria-labelledby="messageModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="messageModalLabel"></h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body" id="messageModalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-dismiss="modal" id="messageOkBtn"></button>
          </div>
        </div>
      </div>
    </div>
    
    <footer>
      <div>
        <span id="footerText"></span>
      </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    
    <!-- Animation -->
    <script src="../js/animation/animation.js"></script>

    <!-- Translations -->
    <script src="../js/translations/translations.js"></script>

    <!-- App -->
    <script src="../js/app/state_app.js"></script>
    <script src="../js/app/language_app.js"></script>
    <script src="../js/app/modals_app.js"></script>
    <script src="../js/app/navigation_app.js"></script>
    <script src="../js/app/init_app.js"></script>

    <!-- Multipop -->
    <script src="../js/multipop/state_multipop.js"></script>
    <script src="../js/multipop/ui_multipop.js"></script>
    <script src="../js/multipop/manual_multipop.js"></script>
    <script src="../js/multipop/actions_multipop.js"></script>
    <script src="../js/multipop/syntax_multipop.js"></script>
    <script src="../js/multipop/bestWorst_multipop.js"></script>

    <!-- Queue2Stacks -->
    <script src="../js/queue2Stacks/state_queue2Stacks.js"></script>
    <script src="../js/queue2Stacks/ui_queue2Stacks.js"></script>
    <script src="../js/queue2Stacks/manual_queue2Stacks.js"></script>
    <script src="../js/queue2Stacks/actions_queue2Stacks.js"></script>
    <script src="../js/queue2Stacks/syntax_queue2Stacks.js"></script>
    <script src="../js/queue2Stacks/bestWorst_queue2Stacks.js"></script>

    <!-- Splay Tree -->
    <script src="../js/splayTree/state_splayTree.js"></script>
    <script src="../js/splayTree/ui_splayTree.js"></script>
    <script src="../js/splayTree/manual_splayTree.js"></script>
    <script src="../js/splayTree/actions_splayTree.js"></script>
    <script src="../js/splayTree/syntax_splayTree.js"></script>
    <script src="../js/splayTree/bestWorst_splayTree.js"></script>

    <!-- Types Params -->
    <script src="../js/typesParams/helpers_typesParams.js"></script>
    <script src="../js/typesParams/manual_typesParams.js"></script>
    <script src="../js/typesParams/random_typesParams.js"></script>
    <script src="../js/typesParams/bestWorst_typesParams.js"></script>
    <script src="../js/typesParams/syntax_typesParams.js"></script>

</body>
</html>
